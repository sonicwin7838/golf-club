<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星宇一桿進洞</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="星宇高爾夫">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2E7D52">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="manifest" href="manifest.json">
<style>
:root{--green:#2E7D52;--green-light:#4CAF7D;--gold:#B8860B;--gold-light:#D4A017;--bg:#F2F2F7;--surface:rgba(255,255,255,0.75);--text:#1C1C1E;--text2:#3A3A3C;--text3:#636366;--text4:#8E8E93;--border:rgba(60,60,67,0.12);--border2:rgba(60,60,67,0.06);--shadow:0 2px 16px rgba(0,0,0,0.07);--shadow2:0 8px 32px rgba(0,0,0,0.12);--radius:16px;--radius-sm:10px;--radius-xs:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:2px;}

/* LOGIN */
#name-screen{display:none;min-height:100vh;position:relative;overflow:hidden;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:48px 28px;background:linear-gradient(145deg,#E8F5EE 0%,#F0FAF4 30%,#FAFFF8 60%,#F5F0FF 100%);}
.login-bg span{position:absolute;border-radius:50%;pointer-events:none;}
.login-bg span:nth-child(1){width:400px;height:400px;top:-100px;left:-100px;background:radial-gradient(circle,rgba(46,125,82,0.12) 0%,transparent 70%);}
.login-bg span:nth-child(2){width:300px;height:300px;bottom:-50px;right:-50px;background:radial-gradient(circle,rgba(184,134,11,0.1) 0%,transparent 70%);}
.login-card{position:relative;z-index:1;background:rgba(255,255,255,0.75);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,0.9);border-radius:28px;padding:40px 28px;width:100%;max-width:360px;box-shadow:0 8px 48px rgba(46,125,82,0.12),0 2px 8px rgba(0,0,0,0.06);animation:fadeUp 0.6s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(32px) scale(0.96);}to{opacity:1;transform:translateY(0) scale(1);}}
.club-logo{width:88px;height:88px;margin:0 auto 18px;background:linear-gradient(135deg,#2E7D52,#4CAF7D);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:42px;box-shadow:0 8px 24px rgba(46,125,82,0.3);}
.club-en{font-size:11px;letter-spacing:3px;color:var(--green);font-weight:500;margin-bottom:4px;text-transform:uppercase;}
.club-zh{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:1px;}
.club-tag{font-size:12px;color:var(--text4);margin-bottom:28px;}
.hr{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:0 0 24px;}
.login-hint{font-size:13px;color:var(--text3);margin-bottom:10px;}
#name-input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.8);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:16px;font-family:'Noto Sans TC',sans-serif;outline:none;margin-bottom:14px;transition:all 0.2s;text-align:center;}
#name-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(46,125,82,0.12);}
#name-input::placeholder{color:var(--text4);}
.btn-login{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--green),var(--green-light));color:white;font-size:15px;font-weight:600;font-family:'Noto Sans TC',sans-serif;cursor:pointer;letter-spacing:1px;transition:all 0.2s;box-shadow:0 4px 16px rgba(46,125,82,0.35);}
.btn-login:active{transform:scale(0.98);}

/* MAIN */
#main-app{display:none;width:100%;min-height:100vh;background:var(--bg);}
.header{background:rgba(242,242,247,0.88);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:0.5px solid var(--border);padding:0 max(16px,2vw);position:sticky;top:0;z-index:20;width:100%;}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 0 0;}
.header-logo-row{display:flex;align-items:center;gap:10px;}
.header-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--green),var(--green-light));display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 8px rgba(46,125,82,0.3);}
.header-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--text);}
.header-sub{font-size:11px;color:var(--text4);margin-top:1px;}
.header-btns{display:flex;gap:6px;align-items:center;}
.btn-admin{font-size:12px;padding:6px 12px;border-radius:20px;background:rgba(255,255,255,0.7);border:0.5px solid var(--border);color:var(--text3);cursor:pointer;font-family:'Noto Sans TC',sans-serif;backdrop-filter:blur(8px);transition:all 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.btn-admin.active{background:linear-gradient(135deg,var(--green),var(--green-light));color:white;border-color:transparent;box-shadow:0 2px 8px rgba(46,125,82,0.3);}
.btn-logout{font-size:12px;padding:6px 10px;border-radius:20px;background:rgba(255,59,48,0.07);border:0.5px solid rgba(255,59,48,0.2);color:#D32F2F;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.2s;}
.nav{display:flex;padding:8px 0 0;}
.nav-item{flex:1;padding:8px 4px 10px;text-align:center;font-size:12px;color:var(--text4);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;font-weight:500;}
.nav-item.active{color:var(--green);border-bottom-color:var(--green);font-weight:600;}
.content{padding:14px;}

/* HERO */
.hero{border-radius:20px;overflow:hidden;margin-bottom:16px;position:relative;height:150px;background:linear-gradient(135deg,#2E7D52 0%,#4CAF7D 60%,#81C995 100%);box-shadow:var(--shadow2);}
.hero-text{position:absolute;bottom:16px;left:18px;}
.hero-text h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:white;text-shadow:0 1px 8px rgba(0,0,0,0.2);}
.hero-text p{font-size:12px;color:rgba(255,255,255,0.8);margin-top:2px;}
.hero-deco{position:absolute;right:16px;bottom:12px;font-size:64px;opacity:0.18;}

/* CARDS */
.card{background:var(--surface);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:0.5px solid rgba(255,255,255,0.9);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.card-golf{border-top:2px solid var(--green);}
.card-dinner{border-top:2px solid var(--gold);}
.card-ended{opacity:0.65;border-top-color:#aaa;}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 10px;border-radius:20px;margin-bottom:4px;font-weight:600;}
.badge-golf{background:rgba(46,125,82,0.1);color:var(--green);border:0.5px solid rgba(46,125,82,0.25);}
.badge-dinner{background:rgba(184,134,11,0.1);color:var(--gold);border:0.5px solid rgba(184,134,11,0.25);}
.badge-meal{background:rgba(255,149,0,0.1);color:#E65100;border:0.5px solid rgba(255,149,0,0.25);font-size:10px;}
.badge-closed{background:rgba(255,59,48,0.08);color:#D32F2F;border:0.5px solid rgba(255,59,48,0.2);}
.badge-ended{background:rgba(100,100,100,0.08);color:#666;border:0.5px solid rgba(100,100,100,0.2);}
.badge-deadline{background:rgba(255,149,0,0.1);color:#E65100;border:0.5px solid rgba(255,149,0,0.3);font-size:10px;}
.badge-mine{background:rgba(46,125,82,0.1);color:var(--green);border:0.5px solid rgba(46,125,82,0.3);font-size:10px;}

.ev-title{font-size:17px;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.4;}
.ev-meta{font-size:13px;color:var(--text3);margin-bottom:10px;line-height:1.9;}
.count-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text3);margin-bottom:12px;}
.count-num{font-weight:600;color:var(--green);}
.count-bar{flex:1;height:3px;background:rgba(0,0,0,0.06);border-radius:2px;overflow:hidden;}
.count-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--green-light));border-radius:2px;transition:width 0.5s ease;}

/* REG LIST */
.reg-toggle{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--green);cursor:pointer;margin-bottom:10px;font-weight:500;background:none;border:none;font-family:'Noto Sans TC',sans-serif;padding:0;}
.reg-toggle .arr{font-size:10px;transition:transform 0.2s;display:inline-block;}
.reg-toggle.open .arr{transform:rotate(90deg);}
.reg-box{display:none;margin-bottom:10px;padding:10px 12px;background:rgba(46,125,82,0.04);border-radius:var(--radius-xs);border:0.5px solid rgba(46,125,82,0.12);}
.reg-box.open{display:block;}
.reg-section-label{font-size:11px;font-weight:600;margin-bottom:4px;margin-top:2px;}
.member-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(46,125,82,0.07);border:0.5px solid rgba(46,125,82,0.15);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--text2);margin:3px 3px 0 0;}
.guest-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(184,134,11,0.07);border:0.5px solid rgba(184,134,11,0.2);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--text2);margin:3px 3px 0 0;}
.chip-f{font-size:10px;color:#AD1457;}
.chip-guest{font-size:10px;color:var(--text4);}
.chip-nomeal{font-size:10px;color:#E65100;}

/* COPY BOX */
.copy-box{background:rgba(0,0,0,0.03);border:0.5px solid var(--border);border-radius:var(--radius-xs);padding:12px 14px;font-size:13px;color:var(--text2);line-height:1.8;white-space:pre-wrap;word-break:break-all;margin-bottom:8px;font-family:'Noto Sans TC',sans-serif;max-height:280px;overflow-y:auto;}
.copy-btn-row{display:flex;gap:8px;margin-bottom:12px;}
.copy-btn{flex:1;padding:9px;border-radius:var(--radius-xs);background:rgba(46,125,82,0.08);border:0.5px solid rgba(46,125,82,0.25);color:var(--green);font-size:12px;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.2s;}
.copy-btn:active{background:rgba(46,125,82,0.15);}
.update-btn{flex:1;padding:9px;border-radius:var(--radius-xs);background:rgba(184,134,11,0.07);border:0.5px solid rgba(184,134,11,0.25);color:var(--gold);font-size:12px;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.2s;}

/* BUTTONS */
.btn-row{display:flex;flex-direction:column;gap:8px;}
.btn{width:100%;padding:11px;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:500;transition:all 0.2s;letter-spacing:0.5px;border:none;display:block;}
.btn:active{transform:scale(0.98);}
.btn-primary{background:linear-gradient(135deg,var(--green),var(--green-light));color:white;box-shadow:0 3px 12px rgba(46,125,82,0.3);}
.btn-primary:disabled{background:rgba(0,0,0,0.1);color:var(--text4);box-shadow:none;cursor:not-allowed;}
.btn-glass{background:rgba(46,125,82,0.08);border:0.5px solid rgba(46,125,82,0.25);color:var(--green);}
.btn-glass-gold{background:rgba(184,134,11,0.07);border:0.5px solid rgba(184,134,11,0.25);color:var(--gold);}
.btn-glass-red{background:rgba(255,59,48,0.06);border:0.5px solid rgba(255,59,48,0.2);color:#D32F2F;}
.btn-glass-gray{background:rgba(0,0,0,0.04);border:0.5px solid var(--border);color:var(--text3);}
.btn-sm{padding:7px 14px;font-size:12px;width:auto;display:inline-block;}
.btn-xs{padding:4px 10px;font-size:11px;width:auto;display:inline-block;border-radius:6px;}

/* ADMIN ACTIONS */
.admin-action{display:flex;align-items:center;gap:12px;width:100%;padding:14px 16px;background:var(--surface);border:0.5px solid rgba(255,255,255,0.9);border-radius:var(--radius);cursor:pointer;margin-bottom:9px;font-family:'Noto Sans TC',sans-serif;text-align:left;box-shadow:var(--shadow);transition:all 0.2s;backdrop-filter:blur(20px);}
.admin-action:active{transform:scale(0.99);}
.admin-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.admin-title{font-size:14px;font-weight:600;color:var(--text);}
.admin-sub{font-size:12px;color:var(--text4);margin-top:2px;}

/* ANNOUNCE */
.announce-card{background:rgba(255,248,220,0.8);backdrop-filter:blur(16px);border:0.5px solid rgba(184,134,11,0.2);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);}
.an-title{font-size:14px;font-weight:600;color:#7A5800;margin-bottom:5px;}
.an-body{font-size:13px;color:#8A6500;line-height:1.7;}
.an-date{font-size:11px;color:rgba(184,134,11,0.7);margin-top:8px;}

/* MY REG */
.my-reg-card{background:var(--surface);backdrop-filter:blur(20px);border:0.5px solid rgba(255,255,255,0.9);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);}
.my-reg-title{font-size:15px;font-weight:600;color:var(--text);}
.my-reg-meta{font-size:12px;color:var(--text4);margin-top:3px;margin-bottom:10px;}

/* TAGS */
.tag{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;margin:2px 2px 0 0;}
.tag-veg{background:rgba(76,175,61,0.1);color:#2E7D32;border:0.5px solid rgba(76,175,61,0.25);}
.tag-nomeal{background:rgba(255,149,0,0.1);color:#E65100;border:0.5px solid rgba(255,149,0,0.3);}
.tag-guest{background:rgba(46,125,82,0.08);color:var(--green);border:0.5px solid rgba(46,125,82,0.2);}
.tag-fee{background:rgba(184,134,11,0.1);color:var(--gold);border:0.5px solid rgba(184,134,11,0.25);}
.tag-f{background:rgba(233,30,99,0.08);color:#AD1457;border:0.5px solid rgba(233,30,99,0.2);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);}
.modal-overlay.open{display:flex;}
.modal{background:rgba(250,250,252,0.96);backdrop-filter:blur(32px) saturate(200%);-webkit-backdrop-filter:blur(32px) saturate(200%);border:0.5px solid rgba(255,255,255,0.9);border-radius:24px 24px 0 0;padding:0 16px 44px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;box-shadow:0 -4px 40px rgba(0,0,0,0.15);}
.modal-handle{width:36px;height:4px;background:rgba(0,0,0,0.15);border-radius:2px;margin:12px auto 16px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-size:17px;font-weight:600;color:var(--text);}
.modal-close{background:rgba(0,0,0,0.06);border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;color:var(--text3);display:flex;align-items:center;justify-content:center;}

/* FIELDS */
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text3);margin-bottom:7px;letter-spacing:0.5px;}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;background:rgba(255,255,255,0.85);border:0.5px solid var(--border);border-radius:var(--radius-xs);color:var(--text);font-size:15px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:all 0.2s;box-shadow:inset 0 1px 3px rgba(0,0,0,0.04);}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(46,125,82,0.1);}
.field textarea{min-height:72px;resize:vertical;}
.field input[readonly]{color:var(--text3);background:rgba(0,0,0,0.03);}
.field select option{background:white;}

/* GENDER */
.gender-row{display:flex;gap:8px;margin-bottom:16px;}
.gender-btn{flex:1;padding:10px;border-radius:var(--radius-xs);font-size:14px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:500;background:rgba(255,255,255,0.85);border:0.5px solid var(--border);color:var(--text3);transition:all 0.2s;}
.gender-btn.sel-m{background:rgba(33,150,243,0.1);border-color:rgba(33,150,243,0.4);color:#1565C0;font-weight:600;}
.gender-btn.sel-f{background:rgba(233,30,99,0.08);border-color:rgba(233,30,99,0.3);color:#AD1457;font-weight:600;}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:rgba(255,255,255,0.85);border:0.5px solid var(--border);border-radius:var(--radius-xs);margin-bottom:16px;}
.toggle-label{font-size:15px;color:var(--text);}
.toggle{position:relative;width:44px;height:26px;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:13px;transition:0.3s;}
.toggle-slider:before{content:'';position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.3s;box-shadow:0 1px 4px rgba(0,0,0,0.2);}
.toggle input:checked+.toggle-slider{background:var(--green);}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px);}

.fee-notice{font-size:12px;color:#E65100;margin-top:6px;padding:8px 12px;background:rgba(255,149,0,0.08);border-radius:8px;border-left:3px solid rgba(255,149,0,0.5);}
.guest-block{background:rgba(46,125,82,0.04);border:0.5px solid rgba(46,125,82,0.15);border-radius:var(--radius-xs);padding:12px;margin-bottom:12px;}
.guest-block-title{font-size:12px;font-weight:600;color:var(--green);margin-bottom:10px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* STAT */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
.stat-card{background:rgba(255,255,255,0.8);backdrop-filter:blur(16px);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:12px;box-shadow:var(--shadow);}
.stat-label{font-size:11px;color:var(--text4);margin-bottom:4px;}
.stat-val{font-size:24px;font-weight:700;color:var(--green);}

/* TABLE */
.reg-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px;}
.reg-table th{background:rgba(46,125,82,0.08);color:var(--green);font-weight:600;padding:7px 8px;text-align:left;border-bottom:0.5px solid rgba(46,125,82,0.2);}
.reg-table td{padding:7px 8px;border-bottom:0.5px solid var(--border2);color:var(--text2);vertical-align:middle;}
.reg-table tr:last-child td{border-bottom:none;}
.reg-table .f-label{color:#AD1457;font-size:10px;font-weight:600;}
.reg-table .nomeal-label{color:#E65100;font-size:10px;}

/* MAP TABLE */
.map-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px;}
.map-table th{background:rgba(46,125,82,0.08);color:var(--green);font-weight:600;padding:8px 10px;text-align:left;border-bottom:0.5px solid rgba(46,125,82,0.2);}
.map-table td{padding:8px 10px;border-bottom:0.5px solid var(--border2);color:var(--text2);}
.map-table tr:last-child td{border-bottom:none;}
.map-row-del{background:none;border:none;color:#D32F2F;cursor:pointer;font-size:14px;padding:0 4px;}
.member-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px;}
.member-table th{background:rgba(46,125,82,0.08);color:var(--green);font-weight:600;padding:8px 10px;text-align:left;border-bottom:0.5px solid rgba(46,125,82,0.2);}
.member-table td{padding:8px 10px;border-bottom:0.5px solid var(--border2);color:var(--text2);vertical-align:middle;}
.member-table tr:last-child td{border-bottom:none;}

<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, push, update, remove, onValue, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyCWRfgn7_IeNr9-aQCSAIdrHojKLjHQhPQ",
  authDomain: "golf-club-3d62c.firebaseapp.com",
  databaseURL: "https://golf-club-3d62c-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "golf-club-3d62c",
  storageBucket: "golf-club-3d62c.firebasestorage.app",
  messagingSenderId: "480200099410",
  appId: "1:480200099410:web:8f2758868e8bafe873818b"
};
const ADMIN_PWD = '1234';
const LIFF_ID = '2009846358-j74I4aJG';

const DEFAULT_MEMBER_GENDERS = {
  '陰建宏':'male','蔡育霖':'male','柳郁禎':'male','萬修易':'male','汪修平':'male',
  '江俊霆':'male','高宗鵬':'male','林進榮':'male','甘嘉美':'female','張繼文':'male',
  '蔡文欽':'male','葉柏寬':'male','陳怡聲':'male','張晟恩':'male','黃志豪':'male',
  '王信章':'male','林中庸':'male','洪肇顯':'male','劉毅博':'male','劉育正':'male'
};
const DEFAULT_NAME_MAP = {
  'Jackal':'陰建宏','Rober 蘿蔔':'蔡育霖','Sonic':'柳郁禎','萬':'萬修易',
  'Kuma':'汪修平','阿霆':'江俊霆','Tim Kao_宗鵬':'高宗鵬','林進榮':'林進榮',
  'Mika Kan':'甘嘉美','Kevin Chang':'張繼文','Wen Chin':'蔡文欽','Bo Kuan':'葉柏寬',
  'Eason':'陳怡聲','張晟恩':'張晟恩','黃志豪':'黃志豪','雲飄渺':'王信章',
  '林中庸':'林中庸','Carlos 𓆡𓆝 𓆡𓆝𓆝𓆝':'洪肇顯','劉毅球':'劉毅博','AO 劉育正 Eric':'劉育正'
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

let currentUser = localStorage.getItem('gc_user') || null;
let scores={}, handicaps={}, extraAwards={};
let isAdmin = false;
let events={}, announces={}, regs={}, nameMap={}, memberGenders={};

// ── UTILS ──
function normalize(s){ return (s||'').toLowerCase().replace(/[\s\-_.,!@#$%^&*()\[\]{}'";:\/\\|<>?~`𓆡𓆝]+/g,''); }
function isMember(n){ const norm=normalize(n); return Object.values(nameMap).some(r=>normalize(r)===norm)||Object.keys(nameMap).some(l=>normalize(l)===norm)||Object.keys(DEFAULT_MEMBER_GENDERS).some(m=>normalize(m)===norm); }
function getMemberGender(n){ return memberGenders[n]||DEFAULT_MEMBER_GENDERS[n]||'male'; }
function hasMeal(ev){ return ev.type==='dinner'||(ev.type==='golf'&&ev.withMeal); }
function getEvRegs(id){ return Object.entries(regs).filter(([,r])=>r.eventId===id); }
function getRegCount(id){ const all=getEvRegs(id); return all.filter(([,r])=>!r.isGuest).length+all.filter(([,r])=>r.isGuest).length; }
function getMyReg(id){ return Object.entries(regs).find(([,r])=>r.eventId===id&&r.name===currentUser&&!r.isGuest); }
function getMemberNames(id){ return [...new Set(getEvRegs(id).filter(([,r])=>!r.isGuest).map(([,r])=>r.name))]; }
function calcAssemble(t){ if(!t) return ''; const [h,m]=t.split(':').map(Number),tot=h*60+m-20; return `${String(Math.floor(tot/60)).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`; }

function isEventEnded(ev){ if(!ev.date) return false; const d=new Date(ev.date); d.setHours(23,59,59,999); return new Date()>d; }
function isDeadlinePassed(ev){ if(isEventEnded(ev)) return true; if(ev.closed) return true; if(!ev.date) return false; const [y,m,d]=ev.date.split('-').map(Number); return new Date()>new Date(y,m-1,d-1,23,59,59); }
function getDeadlineStr(ev){ if(!ev.date) return ''; const [y,m,d]=ev.date.split('-').map(Number); return `${m}/${d-1} 23:59 截止`; }
function canEditEvent(ev){ return isAdmin||(ev.createdBy===currentUser); }

function resolveName(n){ if(!n) return n; const t=n.trim(); if(nameMap[t]) return nameMap[t]; const ni=normalize(t); for(const [l,r] of Object.entries(nameMap)) if(normalize(l)===ni) return r; return t; }
function weekday(dateStr){ const d=new Date(dateStr),days=['日','一','二','三','四','五','六']; return days[d.getDay()]; }

// ── LIFF ──
async function getLiffName(){ try{ if(typeof liff==='undefined') return null; await liff.init({liffId:LIFF_ID}); if(!liff.isLoggedIn()){ if(liff.isInClient()) liff.login(); return null; } const p=await liff.getProfile(); return p.displayName||null; }catch(e){ return null; } }

// ── INIT ──
window.addEventListener('DOMContentLoaded', async ()=>{
  const [sm,sg]=await Promise.all([get(ref(db,'nameMap')),get(ref(db,'memberGenders'))]);
  nameMap=sm.exists()?sm.val():{...DEFAULT_NAME_MAP};
  if(!sm.exists()) await set(ref(db,'nameMap'),nameMap);
  memberGenders=sg.exists()?sg.val():{...DEFAULT_MEMBER_GENDERS};
  if(!sg.exists()) await set(ref(db,'memberGenders'),memberGenders);
  onValue(ref(db,'nameMap'),s=>{ if(s.exists()) nameMap=s.val(); });
  onValue(ref(db,'memberGenders'),s=>{ if(s.exists()) memberGenders=s.val(); });
  if(!currentUser){
    const ln=await getLiffName();
    if(ln) document.getElementById('name-input').value=resolveName(ln);
    document.getElementById('name-screen').style.display='flex';
  } else startApp();
});

window.setName=()=>{ const v=document.getElementById('name-input').value.trim(); if(!v){showToast('請輸入姓名');return;} currentUser=v; localStorage.setItem('gc_user',v); document.getElementById('name-screen').style.display='none'; startApp(); };
window.logout=()=>{ if(!confirm('確定要登出嗎？')) return; localStorage.removeItem('gc_user'); currentUser=null; isAdmin=false; document.getElementById('main-app').style.display='none'; document.getElementById('name-screen').style.display='flex'; document.getElementById('name-input').value=''; };

function startApp(){
  document.getElementById('main-app').style.display='block';
  document.getElementById('user-welcome').textContent='歡迎，'+currentUser;
  onValue(ref(db,'events'),s=>{ events=s.val()||{}; renderEvents(); if(isAdmin) renderAdminStats(); });
  onValue(ref(db,'announces'),s=>{ announces=s.val()||{}; renderAnnounces(); });
  onValue(ref(db,'regs'),s=>{ regs=s.val()||{}; renderEvents(); renderMine(); if(isAdmin) renderAdminStats(); });
  onValue(ref(db,'scores'),s=>{ scores=s.val()||{}; });
  onValue(ref(db,'handicaps'),s=>{ handicaps=s.val()||{}; });
  onValue(ref(db,'extraAwards'),s=>{ extraAwards=s.val()||{}; });
}

window.switchTab=tab=>{ ['home','announce','mine','score','leaderboard','admin'].forEach(t=>{ document.getElementById('tab-'+t).style.display=t===tab?'block':'none'; const n=document.getElementById('nav-'+t); if(n) n.classList.toggle('active',t===tab); }); if(tab==='admin') renderAdminStats(); if(tab==='score') renderScoreTab(); if(tab==='leaderboard') renderLeaderboard(); };

window.toggleAdmin=()=>{
  if(!isAdmin){ const pwd=prompt('請輸入管理員密碼：'); if(pwd===ADMIN_PWD){ isAdmin=true; document.getElementById('admin-toggle').classList.add('active'); document.getElementById('admin-toggle').textContent='管理員 ✓'; document.getElementById('nav-admin').style.display='block'; showToast('管理員模式已開啟'); renderAnnounces(); renderEvents(); } else if(pwd!==null) showToast('密碼錯誤'); }
  else{ isAdmin=false; document.getElementById('admin-toggle').classList.remove('active'); document.getElementById('admin-toggle').textContent='管理員'; document.getElementById('nav-admin').style.display='none'; renderAnnounces(); renderEvents(); switchTab('home'); }
};

// ── MONTH TABS ──
function getHeaderHeight(){
  const header=document.querySelector('.header');
  const monthWrap=document.getElementById('month-tabs-wrap');
  const h=(header?header.offsetHeight:64)+(monthWrap&&monthWrap.style.display!=='none'?monthWrap.offsetHeight:0);
  return h+8;
}

function renderMonthTabs(){
  const wrap=document.getElementById('month-tabs-wrap');
  const container=document.getElementById('month-tabs');
  if(!wrap||!container) return;

  const now=new Date();
  const sevenDaysAgo=now.getTime()-7*24*60*60*1000;

  // Get active events only, sorted by date
  const active=Object.entries(events)
    .filter(([,ev])=>!isEventEnded(ev))
    .sort((a,b)=>a[1].date>b[1].date?1:-1);
  if(!active.length){ wrap.style.display='none'; return; }

  // Get unique months in order
  const months=[...new Set(active.map(([,ev])=>{
    const d=new Date(ev.date);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }))];

  if(months.length<=1){ wrap.style.display='none'; return; }
  wrap.style.display='block';

  const hasNew=(month)=>active.some(([,ev])=>{
    const d=new Date(ev.date);
    const m=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    return m===month&&ev.createdAt&&ev.createdAt>sevenDaysAgo;
  });

  container.innerHTML=months.map((m,idx)=>{
    const mo=parseInt(m.split('-')[1]);
    const isNew=hasNew(m);
    return `<button class="month-tab${idx===0?' active':''}" id="mtab-${m}" onclick="scrollToMonth('${m}')">${mo}月${isNew?' <span style="color:#ff3b30;font-size:10px;font-weight:700;">NEW</span>':''}</button>`;
  }).join('');
}

window.scrollToMonth=function(month){
  // Re-query anchor after render
  const anchor=document.getElementById('month-anchor-'+month);
  if(anchor){
    const top=anchor.getBoundingClientRect().top+window.pageYOffset-getHeaderHeight();
    window.scrollTo({top:Math.max(0,top),behavior:'smooth'});
    setTimeout(()=>setActiveMonthTab(month),400);
  } else {
    // Fallback: scroll to top and set active
    window.scrollTo({top:0,behavior:'smooth'});
    setTimeout(()=>setActiveMonthTab(month),400);
  }
};

function setActiveMonthTab(month){
  document.querySelectorAll('.month-tab').forEach(t=>t.classList.remove('active'));
  const tab=document.getElementById('mtab-'+month);
  if(tab){
    tab.classList.add('active');
    tab.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }
}

function updateActiveMonthTab(){
  const anchors=[...document.querySelectorAll('[id^="month-anchor-"]')];
  if(!anchors.length) return;
  const offset=getHeaderHeight()+20;
  let current=anchors[0].id.replace('month-anchor-','');
  for(const a of anchors){
    if(a.getBoundingClientRect().top<=offset){
      current=a.id.replace('month-anchor-','');
    }
  }
  setActiveMonthTab(current);
}

window.addEventListener('scroll',()=>{
  if(document.getElementById('tab-home')&&document.getElementById('tab-home').style.display!=='none'){
    updateActiveMonthTab();
  }

// ── RENDER EVENTS ──
function renderEvents(){
  const el=document.getElementById('events-list');
  const now=new Date();
  const sevenDaysAgo=now.getTime()-7*24*60*60*1000;
  const all=Object.entries(events);
  // Sort: active by date asc, ended at bottom
  const active=all.filter(([,ev])=>!isEventEnded(ev)).sort((a,b)=>a[1].date>b[1].date?1:-1);
  const ended=all.filter(([,ev])=>isEventEnded(ev)).sort((a,b)=>b[1].date>a[1].date?1:-1);
  const list=[...active,...ended];
  if(!list.length){el.innerHTML='<div class="empty-state"><span class="empty-icon">📅</span>目前沒有活動</div>';renderMonthTabs();return;}

  // Track month anchors
  const seenMonths=new Set();

  el.innerHTML=list.map(([id,ev])=>{
    const isNew=ev.createdAt&&ev.createdAt>sevenDaysAgo&&!isEventEnded(ev);
    const count=getRegCount(id),pct=ev.maxPax?Math.min(100,Math.round(count/ev.maxPax*100)):0;
    const myReg=getMyReg(id),isGolf=ev.type==='golf',meal=hasMeal(ev);
    const ended=isEventEnded(ev),deadlinePassed=isDeadlinePassed(ev);
    // Month anchor
    const evDate=new Date(ev.date);
    const monthKey=`${evDate.getFullYear()}-${String(evDate.getMonth()+1).padStart(2,'0')}`;
    const needsAnchor=!ended&&!seenMonths.has(monthKey);
    if(!ended) seenMonths.add(monthKey);
    const anchorHtml=needsAnchor?`<div id="month-anchor-${monthKey}" style="position:relative;"></div>`:'';
    const evRegs=getEvRegs(id);
    const memberList=evRegs.filter(([,r])=>!r.isGuest);
    const guestList=evRegs.filter(([,r])=>r.isGuest);
    const showGuestBtn=!isMember(currentUser);
    const canEdit=canEditEvent(ev);

    const memberChips=memberList.map(([,r])=>{
      const actualG=guestList.filter(([,g])=>g.hostName===r.name).length;
      const g=r.gender||getMemberGender(r.name);
      return `<span class="member-chip">${r.name}${g==='female'?'<span class="chip-f">（女）</span>':''}${actualG>0?`<span class="chip-guest"> +${actualG}</span>`:''}${r.noMeal?'<span class="chip-nomeal"> 不用餐</span>':''}</span>`;
    }).join('');
    const guestChips=guestList.map(([,r])=>`<span class="guest-chip">${r.name}${r.gender==='female'?'<span class="chip-f">（女）</span>':''}${r.noMeal?'<span class="chip-nomeal"> 不用餐</span>':''}<span class="chip-guest">（${r.hostName}邀請）</span></span>`).join('');

    let metaLines=`📅 ${ev.date}`;
    if(isGolf){ if(ev.teeTime) metaLines+=`&nbsp;&nbsp;⛳ 開球 ${ev.teeTime}`; if(ev.teeTime) metaLines+=`&nbsp;&nbsp;🏁 集合 ${calcAssemble(ev.teeTime)}`; if(ev.course) metaLines+=`<br>🏌️ ${ev.course}`; if(meal&&ev.restaurant) metaLines+=`<br>🍽️ ${ev.restaurant}`; if(meal&&ev.diningTime) metaLines+=`&nbsp;&nbsp;⏰ 聚餐 ${ev.diningTime}`; }
    else{ if(ev.diningTime) metaLines+=`&nbsp;&nbsp;⏰ ${ev.diningTime}`; if(ev.restaurant) metaLines+=`<br>🍽️ ${ev.restaurant}`; }
    if(ev.note) metaLines+=`<br>📝 ${ev.note}`;

    return anchorHtml+`<div class="card ${isGolf?'card-golf':'card-dinner'}${ended?' card-ended':''}">
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;">
        <span class="badge ${isGolf?'badge-golf':'badge-dinner'}">${isGolf?'⛳ 球敘':'🍽️ 餐會'}</span>
        ${meal&&isGolf?'<span class="badge badge-meal">🍽 含餐</span>':''}
        ${isNew?'<span class="badge" style="background:rgba(255,59,48,0.1);color:#ff3b30;border-color:rgba(255,59,48,0.3);font-size:10px;font-weight:700;">🆕 NEW</span>':''}
        ${ended?'<span class="badge badge-ended">已結束</span>':deadlinePassed?'<span class="badge badge-closed">已截止</span>':'<span class="badge badge-deadline">'+getDeadlineStr(ev)+'</span>'}
        ${ev.createdBy&&ev.createdBy!=='admin'?`<span class="badge" style="background:rgba(100,100,255,0.08);color:#3333aa;border-color:rgba(100,100,255,0.2);font-size:10px;">會員自組</span>`:''}
      </div>
      <div class="ev-title">${ev.title}</div>
      <div class="ev-meta">${metaLines}</div>
      <div class="count-row">
        <span class="count-num">${count} 人報名</span>
        ${ev.maxPax?`<div class="count-bar"><div class="count-fill" style="width:${pct}%"></div></div><span>上限 ${ev.maxPax}</span>`:''}
      </div>
      <button class="reg-toggle" id="rt-${id}" onclick="toggleReg('${id}')"><span class="arr">▶</span> 查看報名名單（${memberList.length} 位會員）</button>
      <div class="reg-box" id="rb-${id}">
        ${memberChips?`<div class="reg-section-label" style="color:var(--green);">會員</div>${memberChips}`:'<span style="font-size:13px;color:var(--text4);">尚無人報名</span>'}
        ${guestChips?`<div class="reg-section-label" style="color:var(--gold);margin-top:8px;">來賓</div>${guestChips}`:''}
      </div>
      <div class="btn-row">
        ${!ended?(myReg
          ? (!deadlinePassed?`<button class="btn btn-glass" onclick="openEditReg('${id}')">修改報名 / 新增來賓</button><button class="btn btn-glass-red" onclick="cancelReg('${id}')">取消報名</button>`:`<button class="btn btn-primary" disabled>已截止，無法修改</button>`)
          : (!deadlinePassed?`<button class="btn btn-primary" onclick="openRegModal('${id}',false)">立即報名</button>${showGuestBtn?`<button class="btn btn-glass-gold" onclick="openRegModal('${id}',true)">以來賓身份報名</button>`:''}`:`<button class="btn btn-primary" disabled>報名已截止</button>`)
        ):`<button class="btn btn-primary" disabled>活動已結束</button>`}
      </div>
    </div>`;
  }).join('');
  renderMonthTabs();
}

// ── GEN ANN TEXT ──
function genAnnText(ev, id){
  const annNote=ev.annNote||'（重要‼️：來賓餐敘現場繳交500）';
  const isGolf=ev.type==='golf';
  const lines=[];
  if(isGolf){
    lines.push(`🏌️‍♂️ ${ev.title} 🏌️‍♂️`);
    if(ev.date){ const d=new Date(ev.date); lines.push(`球敘日期：${d.getMonth()+1}/${d.getDate()}（${weekday(ev.date)}）`); }
    if(ev.course) lines.push(`球敘球場：${ev.course}`);
    if(ev.teeTime){ lines.push(`集合時間：${calcAssemble(ev.teeTime)}`); lines.push(`開球時間：${ev.teeTime}`); }
    if(hasMeal(ev)&&ev.restaurant) lines.push(`聚餐餐廳：${ev.restaurant}`);
    if(hasMeal(ev)&&ev.diningTime) lines.push(`聚餐時間：${ev.diningTime}`);
  } else {
    lines.push(`🍽️ ${ev.title} 🍽️`);
    if(ev.date){ const d=new Date(ev.date); lines.push(`聚餐日期：${d.getMonth()+1}/${d.getDate()}（${weekday(ev.date)}）`); }
    if(ev.restaurant) lines.push(`餐廳：${ev.restaurant}`);
    if(ev.diningTime) lines.push(`聚餐時間：${ev.diningTime}`);
  }
  lines.push(annNote);
  return lines.join('\n');
}

// ── GEN REG TEXT ──
function genRegText(ev, evRegs){
  const meal=hasMeal(ev);
  const members=evRegs.filter(([,r])=>!r.isGuest);
  const guests=evRegs.filter(([,r])=>r.isGuest);
  const total=members.length+guests.length;
  const isGolf=ev.type==='golf';
  let t=`${isGolf?'⛳':'🍽️'} ${ev.title}\n`;
  t+=`📅 ${ev.date}\n`;
  if(isGolf){
    if(ev.teeTime) t+=`⛳ 開球：${ev.teeTime}　🏁 集合：${calcAssemble(ev.teeTime)}\n`;
    if(ev.course) t+=`🏌️ ${ev.course}\n`;
    if(meal&&ev.restaurant) t+=`🍽️ ${ev.restaurant}`;
    if(meal&&ev.diningTime) t+=`　⏰ ${ev.diningTime}`;
    if(meal) t+='\n';
  } else {
    if(ev.restaurant) t+=`🍽️ ${ev.restaurant}\n`;
    if(ev.diningTime) t+=`⏰ ${ev.diningTime}\n`;
  }
  t+=`${'─'.repeat(16)}\n`;
  t+=`報名名單（共 ${total} 人）\n`;

  // ── 會員區 ──
  t+=`\n【會員】\n`;
  members.forEach(([,r],i)=>{
    const g=r.gender||getMemberGender(r.name);
    const tags=[g==='female'?'（女）':'',r.veg?'（素食）':'',r.noMeal?'（不用餐）':''].filter(Boolean);
    t+=`${i+1}. ${r.name}${tags.join('')}\n`;
  });

  // ── 來賓區 ──
  if(guests.length){
    t+=`\n【來賓】\n`;
    guests.forEach(([,g],i)=>{
      const tags=[g.gender==='female'?'（女）':'',g.veg?'（素食）':'',g.noMeal?'（不用餐）':''].filter(Boolean);
      t+=`${i+1}. ${g.name}${tags.join('')}\n`;
    });
  }

  t+=`${'─'.repeat(16)}`;
  if(meal) t+=`\n⚠️ 用餐來賓須繳交 NT$500 餐費`;
  return t;
}

window.openModal=(type,extra)=>{
  let title='',body='';
  if(type==='add-golf'||type==='add-event-member'){
    const isGolf=type!=='add-dinner-member';
    title='新增球敘';
    body=golfFormBody()+'<button class="btn btn-primary" onclick="submitEvent(\'golf\',null)">建立活動</button>';
  } else if(type==='add-dinner'){
    title='新增餐會';
    body=dinnerFormBody()+'<button class="btn btn-primary" onclick="submitEvent(\'dinner\',null)">建立活動</button>';
  } else if(type==='add-event-member'){
    title='建立活動（會員）';
    body=`<div class="field"><label>類型</label><select id="ev-type-sel" onchange="renderMemberEventForm()"><option value="golf">球敘</option><option value="dinner">餐會</option></select></div><div id="ev-type-body">${golfFormBody()}</div><button class="btn btn-primary" onclick="submitMemberEvent()">建立活動</button>`;
  } else if(type==='edit-event'){
    const ev=events[extra]; if(!ev) return;
    title='編輯活動';
    const isGolf=ev.type==='golf';
    body=(isGolf?golfFormBody(ev):dinnerFormBody(ev))+`<button class="btn btn-primary" onclick="submitEvent('${ev.type}','${extra}')">儲存變更</button>`;
  } else if(type==='add-announce'){
    title='發布公告';
    body=`<div class="field"><label>公告標題 *</label><input id="an-title" placeholder="標題"></div><div class="field"><label>內容 *</label><textarea id="an-body" placeholder="公告內容"></textarea></div><button class="btn btn-primary" onclick="submitAnnounce(null)">發布公告</button>`;
  } else if(type==='edit-announce'){
    const a=announces[extra]; if(!a) return;
    title='修改公告';
    body=`<div class="field"><label>公告標題 *</label><input id="an-title" value="${a.title}"></div><div class="field"><label>內容 *</label><textarea id="an-body">${a.body}</textarea></div><button class="btn btn-primary" onclick="submitAnnounce('${extra}')">儲存修改</button>`;
  } else if(type==='name-map'){
    title='Line 名稱對照表'; renderNameMapModal(); document.getElementById('modal-overlay').classList.add('open'); return;
  } else if(type==='member-gender'){
    title='會員性別資料'; renderMemberGenderModal(); document.getElementById('modal-overlay').classList.add('open'); return;
  }
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-overlay').classList.add('open');
};

window.submitEvent=async(type,editId)=>{
  const title=document.getElementById('ev-title').value.trim();
  const date=document.getElementById('ev-date').value;
  const max=parseInt(document.getElementById('ev-max').value)||0;
  const note=document.getElementById('ev-note')?.value.trim()||'';
  if(type==='golf'){
    const course=document.getElementById('ev-course').value.trim();
    if(!title||!date||!course){showToast('請填寫必要欄位（*）');return;}
    const teeTime=document.getElementById('ev-tee').value;
    const withMeal=document.getElementById('ev-meal')?.checked||false;
    const restaurant=withMeal?(document.getElementById('ev-restaurant')?.value.trim()||''):'';
    const diningTime=withMeal?(document.getElementById('ev-dining')?.value||''):'';
    const data={type,title,date,course,teeTime,withMeal,restaurant,diningTime,note,closed:false,maxPax:max};
    if(editId) await update(ref(db,'events/'+editId),data);
    else{ data.createdAt=Date.now(); data.createdBy='admin'; await set(push(ref(db,'events')),data); }
  } else {
    const restaurant=document.getElementById('ev-restaurant').value.trim();
    const diningTime=document.getElementById('ev-dining').value;
    if(!title||!date||!restaurant){showToast('請填寫必要欄位（*）');return;}
    const data={type,title,date,restaurant,diningTime,withMeal:true,note,closed:false,maxPax:max};
    if(editId) await update(ref(db,'events/'+editId),data);
    else{ data.createdAt=Date.now(); data.createdBy='admin'; await set(push(ref(db,'events')),data); }
  }
  closeModal(); showToast(editId?'活動已更新！':'活動已建立！');
};

window.openEditReg=(eventId)=>{
  const ev=events[eventId],meal=hasMeal(ev);

  const [,myReg]=myEntry;
  const myGuests=Object.values(regs).filter(g=>g.isGuest&&g.hostName===currentUser&&g.eventId===eventId);

  const mealToggle=meal?`<div class="toggle-row"><span class="toggle-label">🍽️ 參加聚餐</span><label class="toggle"><input type="checkbox" id="reg-meal" ${!myReg.noMeal?'checked':''}><span class="toggle-slider"></span></label></div>`:'';
  document.getElementById('modal-title').textContent=`修改報名：${ev.title}`;
  document.getElementById('modal-body').innerHTML=`
    <div class="field"><label>姓名</label><input id="reg-name" value="${currentUser}" readonly></div>
    <div class="field"><label>電話</label><input id="reg-phone" value="${myReg.phone||''}" placeholder="電話" type="tel"></div>
    <div class="field"><label>餐飲需求</label><select id="reg-veg"><option value="" ${!myReg.veg?'selected':''}>一般飲食</option><option value="veg" ${myReg.veg?'selected':''}>素食</option></select></div>
    ${mealToggle}
    <div class="field"><label>攜帶來賓人數</label>
      <select id="reg-guests" onchange="updateGuestFields('${eventId}')">

      </select>
    </div>
    <div id="guest-fields"></div>

window.saveEditReg=async(eventId)=>{
  const ev=events[eventId],meal=hasMeal(ev);
  const phone=document.getElementById('reg-phone').value.trim();
  const veg=document.getElementById('reg-veg').value==='veg';
  const noMeal=meal?!(document.getElementById('reg-meal')?.checked??true):false;
  const guestCount=parseInt(document.getElementById('reg-guests').value)||0;
  const note=document.getElementById('reg-note')?.value.trim()||'';
  const myEntry=getMyReg(eventId); if(!myEntry) return;
  const [regKey]=myEntry;
  await update(ref(db,'regs/'+regKey),{phone,veg,noMeal,guestCount,note});
  const oldGuests=Object.entries(regs).filter(([,g])=>g.isGuest&&g.hostName===currentUser&&g.eventId===eventId);
  for(const [k] of oldGuests) await remove(ref(db,'regs/'+k));
  for(let i=1;i<=guestCount;i++){
    const gname=document.getElementById(`g${i}-name`)?.value.trim();
    if(!gname){showToast(`請填寫來賓 ${i} 的姓名`);return;}
    const gphone=document.getElementById(`g${i}-phone`)?.value.trim()||'';
    const gveg=document.getElementById(`g${i}-veg`)?.value==='veg';
    const ggender=getGuestGender(i);
    const gNoMeal=meal?!(document.getElementById(`g${i}-meal`)?.checked??true):false;
    await set(push(ref(db,'regs')),{eventId,name:gname,phone:gphone,veg:gveg,gender:ggender,noMeal:gNoMeal,isGuest:true,hostName:currentUser,time:Date.now()});
  }
  closeModal(); showToast('修改已儲存！');
};

  } else {
    const phone=document.getElementById('reg-phone').value.trim();
    const veg=document.getElementById('reg-veg').value==='veg';
    const noMeal=meal?!(document.getElementById('reg-meal')?.checked??true):false;
    const guestCount=parseInt(document.getElementById('reg-guests').value)||0;

      await set(push(ref(db,'regs')),{eventId,name:gname,phone:gphone,veg:gveg,gender:ggender,noMeal:gNoMeal,isGuest:true,hostName:currentUser,time:Date.now()});
    }
    closeModal(); showToast('報名成功！');
  }

window.openGroupModal=(eventId)=>{
  const ev=events[eventId]; const evRegs=getEvRegs(eventId);
  const members=evRegs.filter(([,r])=>!r.isGuest); const guests=evRegs.filter(([,r])=>r.isGuest);
  const players=[];
  members.forEach(([,r])=>{ const myGuests=guests.filter(([,g])=>g.hostName===r.name); const g=r.gender||getMemberGender(r.name); players.push({name:r.name,gender:g,isGuest:false,hostName:null,linkedGuests:myGuests.map(([,gg])=>({name:gg.name,gender:gg.gender||'male',isGuest:true,hostName:r.name}))}); });
  guests.filter(([,g])=>!members.find(([,m])=>m.name===g.hostName)).forEach(([,g])=>{ players.push({name:g.name,gender:g.gender||'male',isGuest:true,hostName:g.hostName,linkedGuests:[]}); });
  const groups=makeGroups(players); const groupText=genGroupText(ev,groups);
  document.getElementById('modal-title').textContent=`分組結果：${ev.title}`;
  let html='';
  groups.forEach((g,i)=>{ html+=`<div class="group-card"><div class="group-title">第 ${i+1} 組（${g.length} 人）</div>`; g.forEach(p=>{ html+=`<div class="group-member">${p.gender==='female'?'👩':'👨'} ${p.name}${p.gender==='female'?'<span class="f-label">（女）</span>':''}${p.isGuest?`<span class="group-member-guest">（來賓${p.hostName?' / '+p.hostName:''}）</span>`:''}</div>`; }); html+='</div>'; });
  html+=`<div style="margin-top:14px;"><div style="font-size:12px;font-weight:600;color:var(--text3);margin-bottom:6px;">📋 分組文字（可直接複製）</div><div class="copy-box" id="grouptext-box">${groupText}</div><div class="copy-btn-row"><button class="copy-btn" onclick="copyText('grouptext-box')">複製分組結果</button></div></div>`;
  document.getElementById('modal-body').innerHTML=html; document.getElementById('modal-overlay').classList.add('open');
};

function makeGroups(players){
  const groups=[],units=[];
  players.filter(p=>!p.isGuest).forEach(p=>{ units.push([p,...p.linkedGuests]); });
  players.filter(p=>p.isGuest&&!players.find(m=>!m.isGuest&&m.name===p.hostName)).forEach(g=>units.push([g]));
  units.sort((a,b)=>b.length-a.length);
  units.forEach(unit=>{
    if(unit.length>=4){ let chunk=[unit[0]]; for(const gg of unit.slice(1)){ if(chunk.length<4) chunk.push(gg); else{ groups.push(chunk); chunk=[gg]; } } groups.push(chunk); }
    else{ let placed=false; for(const g of groups){ if(g.length+unit.length<=4){g.push(...unit);placed=true;break;} } if(!placed) groups.push([...unit]); }
  });
  for(let pass=0;pass<10;pass++){ let improved=false; for(let i=0;i<groups.length-1&&!improved;i++){ for(let j=i+1;j<groups.length&&!improved;j++){ const gi=groups[i],gj=groups[j]; for(let a=0;a<gi.length&&!improved;a++){ if(gi[a].isGuest) continue; for(let b=0;b<gj.length&&!improved;b++){ if(gj[b].isGuest) continue; const aG=gi.filter(p=>p.isGuest&&p.hostName===gi[a].name); const bG=gj.filter(p=>p.isGuest&&p.hostName===gj[b].name); if(aG.length!==bG.length) continue; const ngi=[...gi.filter(p=>p!==gi[a]&&!aG.includes(p)),gj[b],...bG]; const ngj=[...gj.filter(p=>p!==gj[b]&&!bG.includes(p)),gi[a],...aG]; if(ngi.length>4||ngj.length>4) continue; if(genderScore(ngi)+genderScore(ngj)>genderScore(gi)+genderScore(gj)){groups[i]=ngi;groups[j]=ngj;improved=true;} } } } } if(!improved) break; }
  return groups;
}
function genderScore(g){ const m=g.filter(p=>p.gender==='male').length,f=g.filter(p=>p.gender==='female').length; if(m===g.length||f===g.length) return 2; if(Math.abs(m-f)>=2) return 1; return 0; }
function genGroupText(ev,groups){ let t=`${ev.type==='golf'?'⛳':'🍽️'} ${ev.title} — 分組名單\n📅 ${ev.date}\n`; if(ev.type==='golf'){ if(ev.teeTime) t+=`⛳ 開球：${ev.teeTime}　🏁 集合：${calcAssemble(ev.teeTime)}\n`; if(ev.course) t+=`🏌️ ${ev.course}\n`; } else { if(ev.restaurant) t+=`🍽️ ${ev.restaurant}\n`; if(ev.diningTime) t+=`⏰ ${ev.diningTime}\n`; } t+=`${'─'.repeat(16)}\n`; groups.forEach((g,i)=>{ t+=`【第 ${i+1} 組】\n`; g.forEach((p,j)=>{ t+=`${j+1}. ${p.name}${p.gender==='female'?'（女）':''}${p.isGuest?'（來賓）':''}\n`; }); t+='\n'; }); return t.trim(); }

function renderScoreTab(){

  let html='';

  // Member: select game and submit score
  html+=`<div class="score-card">
    <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;">輸入成績</div>
    <div class="field"><label>選擇球賽</label>

        ${golfEvents.map(([id,ev])=>`<option value="${id}">${ev.title} (${ev.date})</option>`).join('')}
      </select>

  // Show all scores for each event (admin can edit)
  golfEvents.forEach(([id,ev])=>{
    const evScores=Object.entries(scores).filter(([,s])=>s.eventId===id);
    if(!evScores.length&&!isAdmin) return;
    // Build ranked list
    const ranked=evScores.map(([sid,s])=>{
      const hcp=parseInt(handicaps[s.name])||0;
      const net=parseInt(s.strokes)-hcp;
      return {sid,name:s.name,strokes:parseInt(s.strokes),hcp,net};
    });
    // Sort net asc for net rank, strokes asc for gross rank
    const byNet=[...ranked].sort((a,b)=>a.net-b.net);
    const byGross=[...ranked].sort((a,b)=>a.strokes-b.strokes);
    ranked.forEach(r=>{ r.netRank=byNet.findIndex(x=>x.sid===r.sid)+1; r.grossRank=byGross.findIndex(x=>x.sid===r.sid)+1; });
    ranked.sort((a,b)=>a.netRank-b.netRank);

    html+=`<div class="score-card">
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:10px;">${ev.title} <span style="font-size:12px;font-weight:400;color:var(--text4);">${ev.date}</span></div>
      ${ranked.length?`<table class="score-table">
        <thead><tr><th>淨桿名</th><th>姓名</th><th>總桿</th><th>差點</th><th>淨桿</th><th>總桿名</th>${isAdmin?'<th>操作</th>':''}</tr></thead>
        <tbody>${ranked.map(r=>`<tr class="${r.netRank===1?'rank-1':r.netRank===2?'rank-2':r.netRank===3?'rank-3':''}">
          <td>${r.netRank===1?'🥇':r.netRank===2?'🥈':r.netRank===3?'🥉':r.netRank}</td>
          <td>${r.name}</td>
          <td>${isAdmin?`<input class="score-input" type="number" value="${r.strokes}" onchange="adminUpdateScore('${r.sid}',this.value,'strokes')">`:`${r.strokes}`}</td>
          <td>${r.hcp}</td>
          <td style="font-weight:600;color:var(--green);">${r.net}</td>
          <td>${r.grossRank}</td>
          ${isAdmin?`<td><button class="btn btn-glass-red btn-xs" onclick="deleteScore('${r.sid}')">刪</button></td>`:''}
        </tr>`).join('')}</tbody>
      </table>`:'<div style="font-size:13px;color:var(--text4);text-align:center;padding:12px 0;">尚無成績</div>'}
      ${isAdmin?`<div style="margin-top:10px;">
        <div class="copy-btn-row">
          <button class="copy-btn" onclick="copyScoreText('${id}')">複製成績</button>
          <button class="update-btn" onclick="renderScoreTab()">更新</button>
          <button class="update-btn" style="background:rgba(100,100,255,0.07);border-color:rgba(100,100,255,0.25);color:#3333aa;" onclick="openGenerateLeaderboard('${id}')">產生風雲榜</button>
        </div>
      </div>`:''}
    </div>`;
  });

  // Admin: handicap management
  if(isAdmin){
    const memberList=Object.values(nameMap);
    html+=`<div class="score-card">
      <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px;">差點管理</div>
      <table class="score-table">
        <thead><tr><th>姓名</th><th>差點</th></tr></thead>
        <tbody>${memberList.map(name=>`<tr>
          <td style="text-align:left;">${name}</td>
          <td><input class="hcp-input" type="number" value="${handicaps[name]||0}" min="0" max="54" onchange="updateHandicap('${name}',this.value)"></td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
  }

  el.innerHTML=html;
}

  const existing=Object.entries(scores).find(([,s])=>s.eventId===eventId&&s.name===currentUser);

      <div class="award-detail">淨桿 ${lb.netScore} 桿</div>
    </div>
    <div class="award-card">
      <div class="award-title">🏆 總桿冠軍</div>
      <div class="award-winner">${lb.grossChamp}</div>
      <div class="award-detail">總桿 ${lb.grossScore} 桿</div>
    </div>
    <div class="award-card">
      <div class="award-title">🐮 BB 獎</div>
      <div class="award-winner">${lb.bb}</div>
      <div class="award-detail">淨桿 ${lb.bbScore} 桿（倒數第二）</div>
    </div>`;

    // Extra awards
    Object.entries(ea).forEach(([aid,a])=>{
      html+=`<div class="award-card" style="position:relative;">
        <div class="award-title">${a.icon||'🎖️'} ${a.name}</div>
        <div class="award-winner">${a.winner}</div>
        ${a.detail?`<div class="award-detail">${a.detail}</div>`:''}
        ${isAdmin?`<button class="btn btn-glass-red btn-xs" style="position:absolute;top:12px;right:12px;" onclick="deleteExtraAward('${aid}')">刪除</button>`:''}
      </div>`;
    });

    if(isAdmin){
      html+=`<div class="score-card" style="margin-top:8px;">
        <div style="font-size:13px;font-weight:600;color:var(--text3);margin-bottom:10px;">新增額外獎項</div>
        <div class="field"><label>獎項名稱</label><input id="award-name" placeholder="例：最遠一桿"></div>
        <div class="field"><label>表情符號（選填）</label><input id="award-icon" placeholder="例：🎯" style="width:80px;"></div>
        <div class="field"><label>得獎者</label><input id="award-winner" placeholder="姓名"></div>
        <div class="field"><label>說明（選填）</label><input id="award-detail" placeholder="例：第 7 洞 280 碼"></div>
        <button class="btn btn-primary" onclick="addExtraAward()">新增獎項</button>
      </div>`;
    }

    // Copy button
    html+=`<div class="copy-btn-row" style="margin-top:12px;">
      <button class="copy-btn" onclick="copyLeaderboard()">複製風雲榜</button>
      <button class="update-btn" onclick="renderLeaderboard()">更新</button>
    </div>`;

    el.innerHTML=html;
  });
}

window.addExtraAward=async()=>{
  const name=document.getElementById('award-name')?.value.trim();
  const icon=document.getElementById('award-icon')?.value.trim()||'🎖️';
  const winner=document.getElementById('award-winner')?.value.trim();
  const detail=document.getElementById('award-detail')?.value.trim()||'';
  if(!name||!winner){showToast('請填寫獎項名稱和得獎者');return;}
  await set(push(ref(db,'leaderboard/extraAwards')),{name,icon,winner,detail});
  showToast('獎項已新增！'); renderLeaderboard();
};

window.deleteExtraAward=async(aid)=>{ if(!confirm('確定刪除此獎項？')) return; await remove(ref(db,'leaderboard/extraAwards/'+aid)); renderLeaderboard(); showToast('已刪除'); };

window.copyLeaderboard=()=>{
  get(ref(db,'leaderboard')).then(snap=>{
    if(!snap.exists()) return;
    const lb=snap.val(); const ea=lb.extraAwards||{};
    let t=`🏌️ ${lb.eventTitle} 風雲榜
📅 ${lb.eventDate}
${'─'.repeat(16)}
`;
    t+=`🥇 淨桿冠軍：${lb.netChamp}（淨桿 ${lb.netScore} 桿）
`;
    t+=`🏆 總桿冠軍：${lb.grossChamp}（總桿 ${lb.grossScore} 桿）
`;
    t+=`🐮 BB 獎：${lb.bb}（淨桿 ${lb.bbScore} 桿）
`;
    Object.values(ea).forEach(a=>{ t+=`${a.icon||'🎖️'} ${a.name}：${a.winner}${a.detail?' ('+a.detail+')':''}
`; });
    const ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('風雲榜已複製！');
  });
};

window.copyPushText=(eventId, type)=>{
  const ev=events[eventId]; if(!ev) return;
  const isGolf=ev.type==='golf';
  const icon=isGolf?'⛳':'🍽️';
  let text='';
  if(type==='new'){
    text=`🏌️‍♂️ 星宇一桿進洞 活動通知\n`;
    text+=`${icon} ${ev.title} 開放報名！\n`;
    text+=`━━━━━━━━━━━━━━━━\n`;
    text+=`📅 ${ev.date}`;
    if(isGolf){
      if(ev.teeTime) text+=`\n⛳ 開球：${ev.teeTime}　🏁 集合：${calcAssemble(ev.teeTime)}`;
      if(ev.course) text+=`\n🏌️ ${ev.course}`;
      if(hasMeal(ev)&&ev.restaurant) text+=`\n🍽️ ${ev.restaurant}`;
      if(hasMeal(ev)&&ev.diningTime) text+=`　⏰ ${ev.diningTime}`;
    } else {
      if(ev.restaurant) text+=`\n🍽️ ${ev.restaurant}`;
      if(ev.diningTime) text+=`\n⏰ ${ev.diningTime}`;
    }
    if(ev.maxPax) text+=`\n👥 名額：${ev.maxPax} 人`;
    const dl=getDeadlineStr(ev);
    if(dl) text+=`\n⏱️ 截止：${dl}`;
    text+=`\n━━━━━━━━━━━━━━━━\n`;
    text+=`請點以下連結報名 👇\n`;
    text+=`🔗 https://liff.line.me/2009846358-j74I4aJG`;
  } else {
    text=`⏰ 報名提醒\n`;
    text+=`${icon} ${ev.title}\n`;
    const dl=getDeadlineStr(ev);
    if(dl) text+=`截止時間：${dl}\n`;
    text+=`\n尚未報名的會員請盡快完成報名！\n`;
    text+=`🔗 https://liff.line.me/2009846358-j74I4aJG`;
  }
  navigator.clipboard.writeText(text).then(()=>showToast('已複製！貼到 LINE 群組即可')).catch(()=>{
    const ta=document.createElement('textarea'); ta.value=text;
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('已複製！貼到 LINE 群組即可');
  });
};

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
</script>
</body>
</html>
